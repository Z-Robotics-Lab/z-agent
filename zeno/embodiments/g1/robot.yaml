# Unitree G1 humanoid (12-DoF) — embodiment manifest (Stage 1 data only).
# Faithfully captures the constants CURRENTLY hardcoded in
# zeno/hardware/sim/mujoco_g1.py. Not yet wired into the driver
# (that is Stage 2). Values must stay ACCURATE to today's driver.

id: g1
display_name: "Unitree G1 (humanoid, 12-DoF)"

model:
  # 12-DoF G1 model + meshes from assets/g1_gait/ (attached into the go2 room
  # scene with prefix "g1_" at connect()).
  path: assets/g1_gait/g1_12dof.xml
  meshes_dir: assets/g1_gait/meshes
  root_body: g1_pelvis            # _G1Offsets uses model.body("g1_pelvis")

spawn:
  # _G1_SPAWN_X=10.0, _G1_SPAWN_Y=3.0, _G1_PELVIS_Z=0.793 (default stance height).
  xy: [10.0, 3.0]
  base_height: 0.793
  heading: 0.0

# _DEFAULT_ANGLES (12) applied to the leg-qpos slice, in g1_12dof.xml joint
# order: left leg (hip_pitch, hip_roll, hip_yaw, knee, ankle_pitch, ankle_roll)
# then right leg. Joint names are pre-"g1_"-prefix (model joints), matching the
# attached body's joints. Order/values are EXACT to _DEFAULT_ANGLES.
stance:
  left_hip_pitch_joint:    -0.1
  left_hip_roll_joint:     0.0
  left_hip_yaw_joint:      0.0
  left_knee_joint:         0.3
  left_ankle_pitch_joint:  -0.2
  left_ankle_roll_joint:   0.0
  right_hip_pitch_joint:   -0.1
  right_hip_roll_joint:    0.0
  right_hip_yaw_joint:     0.0
  right_knee_joint:        0.3
  right_ankle_pitch_joint: -0.2
  right_ankle_roll_joint:  0.0

sensors:
  # Head RGB camera — added to the pelvis body pre-attach, named 'head_rgb';
  # in the compiled scene it resolves to 'g1_head_rgb' on body 'g1_pelvis'.
  # pos=(0.04, 0, 0.42), xyaxes="0 -1 0 0 0 1" (forward-facing, go2 convention).
  - role: camera
    mount_body: g1_pelvis
    name: g1_head_rgb
    pos: [0.04, 0.0, 0.42]
    params:
      xyaxes: [0, -1, 0, 0, 0, 1]
  # Lidar mounted from pelvis — _LIDAR_OFFSET_X=0.0, _LIDAR_OFFSET_Z=0.72
  # (pelvis z ~0.793 + 0.72 = ~1.51 m head height). Delegated to g1_lidar_scan.
  - role: lidar
    mount_body: g1_pelvis
    pos: [0.0, 0.0, 0.72]         # _LIDAR_OFFSET_X / _LIDAR_OFFSET_Z

policy:
  # 12-DoF RL policy (motion.pt), 50 Hz single-threaded synchronous loop.
  ref: assets/g1_gait/motion.pt
  spec:
    type: rl_jit                  # torch.jit.load(motion.pt)
    sim_dt: 0.002                 # _SIM_DT
    decimation: 10                # _DECIMATION -> 50 Hz policy
    num_obs: 47                   # _NUM_OBS
    num_actions: 12               # _NUM_ACTIONS
    gait_period: 0.8              # _GAIT_PERIOD
    action_scale: 0.25            # _ACTION_SCALE
    body_radius: 0.30             # _G1_BODY_RADIUS (nav inflation)
    nav_speed: 0.5                # _NAV_SPEED
    holonomic: false              # biped; not omnidirectional

capabilities:
  has_base: true
  has_arm: false                  # 12-DoF legs only; no arm in this model
  has_gripper: false
  camera: true                    # g1_head_rgb
  lidar: true                     # get_lidar_scan via g1_lidar_scan
